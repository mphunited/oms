</head>
<body>

<script>
  var msalInstance = new msal.PublicClientApplication({
    auth: {
      clientId: "2785bb21-50cc-4e45-a996-c0aec39b13bd",
      authority: "https://login.microsoftonline.com/3abf2937-e518-43e5-b2a4-456eecfa8b00",
      redirectUri: window.location.origin + "/msal-callback.html",
    }
  });
  msalInstance.initialize().then(function() {
    msalInstance.handleRedirectPromise();
  });
</script>
</body>
</html>
